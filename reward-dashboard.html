<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 داشبورد سیستم پاداش</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <script src="student-auth.js"></script>
    <script src="teacher-auth.js"></script>
    <script src="admin-auth.js"></script>
    <script src="reward-system-v2.js"></script>
    <link rel="stylesheet" href="common-styles.css">
    <style>
        :root {
            --primary: #f59e0b;
            --secondary: #d97706;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1a202c;
            --text: #2d3748;
            --border: #e2e8f0;
            --light: #f7fafc;
            --gold: #FFD700;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: var(--light);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .dashboard-header {
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-right: 4px solid var(--gold);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: white;
            background: var(--gold);
        }
        
        .user-info .name {
            font-size: 17px;
            font-weight: 800;
            color: #1a202c;
        }
        
        .user-info .role {
            font-size: 13px;
            color: #666;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Vazirmatn', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #1a202c;
        }
        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover {
            background: var(--gold);
            color: white;
        }
        
        .logout-btn {
            padding: 8px 18px;
            background: rgba(0, 0, 0, 0.05);
            color: #1a202c;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Vazirmatn', sans-serif;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #ef4444;
        }
        
        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            border-top: 4px solid var(--gold);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #1a202c;
        }
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        /* ===== TABS ===== */
        .reward-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .reward-tab {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Vazirmatn', sans-serif;
            color: #666;
        }
        
        .reward-tab:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        .reward-tab.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: var(--gold);
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== CARDS ===== */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #1a202c;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .card h3 {
            color: #1a202c;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        /* ===== SHOP GRID ===== */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .shop-item {
            background: var(--light);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        
        .shop-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }
        
        .shop-item .si-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        
        .shop-item .si-title {
            font-weight: 800;
            color: #1a202c;
            font-size: 16px;
        }
        
        .shop-item .si-desc {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        .shop-item .si-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            margin: 10px 0;
        }
        
        .shop-item .si-stock {
            font-size: 12px;
            color: #999;
        }
        
        .shop-item .si-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        /* ===== ACTIVITY LIST ===== */
        .activity-item {
            background: var(--light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-right: 4px solid var(--gold);
            transition: all 0.3s;
        }
        
        .activity-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .activity-item .ai-info .ai-title {
            font-weight: 700;
            color: #1a202c;
        }
        
        .activity-item .ai-info .ai-meta {
            font-size: 13px;
            color: #666;
            margin-top: 3px;
        }
        
        .activity-item .ai-points {
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
        }
        
        .activity-item .ai-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .activity-item .ai-status.approved {
            background: #d1fae5;
            color: #065f46;
        }
        .activity-item .ai-status.pending {
            background: #fef3c7;
            color: #92400e;
        }
        .activity-item .ai-status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* ===== LOGIN ===== */
        .login-screen {
            background: white;
            padding: 50px 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .login-screen.hidden {
            display: none;
        }
        
        .login-screen h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #1a202c;
        }
        .login-screen p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1a202c;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        .message.show {
            display: block;
            animation: slideIn 0.4s ease;
        }
        .message.success {
            background: #d1fae5;
            color: #10b981;
        }
        .message.error {
            background: #fee2e2;
            color: #ef4444;
        }
        .message.info {
            background: #dbeafe;
            color: #1e40af;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== LEVEL PROGRESS ===== */
        .level-progress {
            background: var(--light);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }
        
        .level-progress .lp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .level-progress .lp-bar {
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .level-progress .lp-bar .lp-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border-radius: 6px;
            transition: width 0.8s ease;
        }
        
        /* ===== BADGES ===== */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .badge-item {
            background: var(--light);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        
        .badge-item.earned {
            border-color: var(--gold);
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
        }
        
        .badge-item.locked {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        
        .badge-item .bi-icon {
            font-size: 35px;
            display: block;
            margin-bottom: 5px;
        }
        
        .badge-item .bi-name {
            font-size: 13px;
            font-weight: 700;
            color: #1a202c;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }
            .header-right {
                justify-content: center;
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .reward-tabs {
                justify-content: center;
            }
            .reward-tab {
                font-size: 12px;
                padding: 8px 14px;
            }
            .shop-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .shop-grid {
                grid-template-columns: 1fr;
            }
            .activity-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="dashboard-header" id="appHeader" style="display: none;">
            <div class="header-left">
                <div class="avatar" id="userAvatar">🏆</div>
                <div class="user-info">
                    <div class="name" id="userName">کاربر</div>
                    <div class="role" id="userRole">نقش</div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary btn-sm" onclick="window.location.href='index.html'">🏠 صفحه اصلی</button>
                <button class="logout-btn" onclick="handleLogout()">🚪 خروج</button>
            </div>
        </div>
        
        <!-- ===== LOGIN ===== -->
        <div class="login-screen" id="loginScreen">
            <h2>🏆 ورود به سیستم پاداش</h2>
            <p>با نقش خود وارد شوید</p>
            
            <div class="form-group">
                <label>نقش خود را انتخاب کنید:</label>
                <select id="loginRole">
                    <option value="student">👨‍🎓 دانش‌آموز</option>
                    <option value="teacher">👨‍🏫 معلم</option>
                    <option value="admin">👑 مدیر</option>
                </select>
            </div>
            
            <div id="studentLoginFields">
                <div class="form-group">
                    <label>نام دانش‌آموز:</label>
                    <input type="text" id="studentName" placeholder="نام دانش‌آموز">
                </div>
                <div class="form-group">
                    <label>پایه تحصیلی:</label>
                    <select id="studentGrade">
                        <option value="اول">اول ابتدایی</option>
                        <option value="دوم">دوم ابتدایی</option>
                        <option value="سوم">سوم ابتدایی</option>
                        <option value="چهارم">چهارم ابتدایی</option>
                        <option value="پنجم">پنجم ابتدایی</option>
                        <option value="ششم">ششم ابتدایی</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" id="studentPassword" placeholder="رمز عبور (پیش‌فرض: 123456)">
                </div>
            </div>
            
            <div id="teacherLoginFields" style="display: none;">
                <div class="form-group">
                    <label>نام کاربری:</label>
                    <input type="text" id="teacherUsername" placeholder="نام کاربری">
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" id="teacherPassword" placeholder="رمز عبور">
                </div>
            </div>
            
            <div id="adminLoginFields" style="display: none;">
                <div class="form-group">
                    <label>نام کاربری:</label>
                    <input type="text" id="adminUsername" placeholder="نام کاربری">
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" id="adminPassword" placeholder="رمز عبور">
                </div>
            </div>
            
            <button class="btn btn-primary btn-full" onclick="handleLogin()">🔓 ورود</button>
            <div id="loginMessage"></div>
        </div>
        
        <!-- ===== DASHBOARD ===== -->
        <div id="dashboard">
            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>
            
            <!-- Tabs -->
            <div class="reward-tabs" id="rewardTabs"></div>
            
            <!-- ===== TAB: STUDENT REWARDS ===== -->
            <div class="tab-content" id="tab-student">
                <!-- سطح و پیشرفت -->
                <div class="card">
                    <h2>📊 سطح و پیشرفت</h2>
                    <div id="levelContent"></div>
                </div>
                
                <!-- نشان‌ها -->
                <div class="card">
                    <h2>🏅 نشان‌های من</h2>
                    <div id="badgesContent"></div>
                </div>
                
                <!-- تاریخچه امتیازات -->
                <div class="card">
                    <h2>📋 تاریخچه امتیازات</h2>
                    <div id="historyContent"></div>
                </div>
                
                <!-- ویترین جوایز -->
                <div class="card">
                    <h2>🎁 ویترین جوایز</h2>
                    <div id="shopContent"></div>
                </div>
            </div>
            
            <!-- ===== TAB: TEACHER PANEL ===== -->
            <div class="tab-content" id="tab-teacher">
                <div class="card">
                    <h2>📝 ثبت فعالیت جدید برای دانش‌آموز</h2>
                    <div id="teacherActivityForm"></div>
                </div>
                
                <div class="card">
                    <h2>📋 فعالیت‌های ثبت شده</h2>
                    <div id="teacherActivities"></div>
                </div>
                
                <div class="card">
                    <h2>🎁 مدیریت ویترین جوایز</h2>
                    <div id="teacherShop"></div>
                </div>
            </div>
            
            <!-- ===== TAB: ADMIN PANEL ===== -->
            <div class="tab-content" id="tab-admin">
                <div class="card">
                    <h2>📋 تایید درخواست‌ها</h2>
                    <div id="adminApprovals"></div>
                </div>
                
                <div class="card">
                    <h2>📊 گزارش کلی</h2>
                    <div id="adminReport"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // INIT
        // ============================================
        const studentAuth = new StudentAuth();
        const teacherAuth = new TeacherAuth();
        const adminAuth = new AdminAuth();
        const rewardSystem = new RewardSystemV2();
        
        let currentUser = null;
        let currentRole = null;
        
        // ============================================
        // LOGIN HANDLING
        // ============================================
        document.getElementById('loginRole').addEventListener('change', function() {
            const role = this.value;
            document.getElementById('studentLoginFields').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('teacherLoginFields').style.display = role === 'teacher' ? 'block' : 'none';
            document.getElementById('adminLoginFields').style.display = role === 'admin' ? 'block' : 'none';
        });
        
        function handleLogin() {
            const role = document.getElementById('loginRole').value;
            
            if (role === 'student') {
                const name = document.getElementById('studentName').value.trim();
                const grade = document.getElementById('studentGrade').value;
                const password = document.getElementById('studentPassword').value || '123456';
                
                if (!name || !grade) {
                    showMessage('loginMessage', '❌ لطفاً نام و پایه را وارد کنید.', 'error');
                    return;
                }
                
                const result = studentAuth.login(name, grade, password);
                if (result.success) {
                    currentUser = result.student;
                    currentRole = 'student';
                    showMessage('loginMessage', '✅ ورود با موفقیت انجام شد!', 'success');
                    setTimeout(() => loadDashboard(), 500);
                } else {
                    showMessage('loginMessage', result.message, 'error');
                }
            } else if (role === 'teacher') {
                const username = document.getElementById('teacherUsername').value.trim();
                const password = document.getElementById('teacherPassword').value;
                
                if (!username || !password) {
                    showMessage('loginMessage', '❌ لطفاً نام کاربری و رمز عبور را وارد کنید.', 'error');
                    return;
                }
                
                const result = teacherAuth.login(username, password);
                if (result.success) {
                    currentUser = { name: username, role: 'teacher' };
                    currentRole = 'teacher';
                    showMessage('loginMessage', '✅ ورود با موفقیت انجام شد!', 'success');
                    setTimeout(() => loadDashboard(), 500);
                } else {
                    showMessage('loginMessage', result.message, 'error');
                }
            } else if (role === 'admin') {
                const username = document.getElementById('adminUsername').value.trim();
                const password = document.getElementById('adminPassword').value;
                
                if (!username || !password) {
                    showMessage('loginMessage', '❌ لطفاً نام کاربری و رمز عبور را وارد کنید.', 'error');
                    return;
                }
                
                const result = adminAuth.login(username, password);
                if (result.success) {
                    currentUser = { name: username, role: 'admin' };
                    currentRole = 'admin';
                    showMessage('loginMessage', '✅ ورود با موفقیت انجام شد!', 'success');
                    setTimeout(() => loadDashboard(), 500);
                } else {
                    showMessage('loginMessage', result.message, 'error');
                }
            }
        }
        
        function handleLogout() {
            if (confirm('آیا از خروج از سیستم اطمینان دارید؟')) {
                if (currentRole === 'student') studentAuth.logout();
                else if (currentRole === 'teacher') teacherAuth.logout();
                else if (currentRole === 'admin') adminAuth.logout();

        function loadDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appHeader').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'block';
            
            // Update header
            document.getElementById('userName').textContent = currentUser.name;

                currentRole === 'admin' ? `👑 مدیر` : '';

            const tabsContainer = document.getElementById('rewardTabs');

            if (currentRole === 'student') {
                tabsContainer.innerHTML = `

                `;

            } else if (currentRole === 'teacher') {
                tabsContainer.innerHTML = `
                    <button class="reward-tab active" onclick="showTab('teacher')">📝 ثبت فعالیت</button>
                    <button class="reward-tab" onclick="showTab('teacher_shop')">🎁 مدیریت ویترین</button>
                `;
                renderTeacherDashboard();
            } else if (currentRole === 'admin') {
                tabsContainer.innerHTML = `

                `;

        // ============================================
        // SHOW TAB
        // ============================================
        function showTab(tabName) {
            document.querySelectorAll('.reward-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            // Find and activate clicked tab
            const tabs = document.querySelectorAll('.reward-tab');
            const tabMap = {
                'student': 0,
                'teacher': 0,
                'teacher_shop': 1,
                'admin': 0,
                'admin_report': 1
            };
            
            const idx = tabMap[tabName] || 0;
            if (tabs[idx]) tabs[idx].classList.add('active');
            
            // Show content
            if (currentRole === 'student') {
                document.getElementById('tab-student').classList.add('active');
            } else if (currentRole === 'teacher') {
                document.getElementById('tab-teacher').classList.add('active');
                if (tabName === 'teacher_shop') {
                    renderTeacherShop();
                } else {
                    renderTeacherDashboard();
                }
            } else if (currentRole === 'admin') {
                document.getElementById('tab-admin').classList.add('active');
                if (tabName === 'admin_report') {
                    renderAdminReport();
                } else {
                    renderAdminDashboard();
                }
            }
        }

        // ============================================

        function requestTeacherReward() {
            const studentId = document.getElementById('teacherStudentSelect').value;
            const activityId = document.getElementById('teacherActivitySelect').value;
            const points = parseInt(document.getElementById('teacherPoints').value) || 50;
            const note = document.getElementById('teacherNote').value;
            
            if (!studentId) {
                showMessage('teacherFormMessage', '❌ لطفاً دانش‌آموز را انتخاب کنید.', 'error');
                return;
            }
            
            const result = rewardSystem.requestApproval(studentId, activityId, currentUser.name, points, note);
            
            if (result.success) {
                showMessage('teacherFormMessage', result.message, 'success');
                renderTeacherActivities();
                document.getElementById('teacherNote').value = '';
            } else {
                showMessage('teacherFormMessage', result.message, 'error');
            }
        }
        
        // ============================================
        // SHOP MANAGEMENT
        // ============================================
        function openAddShopItem() {
            const title = prompt('🎁 عنوان جایزه:');
            if (!title) return;
            
            const desc = prompt('📝 توضیحات:');
            if (!desc) return;
            
            const points = parseInt(prompt('⭐ امتیاز مورد نیاز (۱۰ تا ۱۰۰۰):')) || 50;
            if (points < 10 || points > 1000) {
                alert('❌ امتیاز باید بین ۱۰ تا ۱۰۰۰ باشد');
                return;
            }
            
            const stock = parseInt(prompt('📦 تعداد موجودی:')) || 10;
            const icon = prompt('🎨 آیکون (مثلاً 🎁):') || '🎁';
            
            const result = rewardSystem.addShopItem(title, desc, points, stock, 'general', icon, currentUser.name);
            
            if (result.success) {
                alert(result.message);
                renderTeacherShop();
            } else {
                alert(result.message);
            }
        }
        
        function removeShopItem(itemId) {
            if (!confirm('⚠️ آیا از حذف این جایزه اطمینان دارید؟')) return;
            
            const result = rewardSystem.removeShopItem(itemId, currentUser.name);
            alert(result.message);
            if (result.success) {
                renderTeacherShop();
                if (currentRole === 'student') {
                    renderStudentDashboard();
                }
            }
        }
        
        function redeemItem(itemId) {
            if (!confirm('🎁 آیا از دریافت این جایزه با امتیاز خود اطمینان دارید؟')) return;
            
            const result = rewardSystem.redeemItem(currentUser.id, itemId);
            alert(result.message);
            if (result.success) {
                renderStudentDashboard();
            }
        }

        function adminApprove(rewardId) {
            if (!confirm('✅ آیا از تایید این درخواست اطمینان دارید؟')) return;
            
            const result = rewardSystem.approveByAdmin(rewardId);
            alert(result.message);

        function adminReject(rewardId) {
            if (!confirm('❌ آیا از رد این درخواست اطمینان دارید؟')) return;
            
            // Remove from pending
            const pending = rewardSystem.data.pendingApprovals;
            rewardSystem.data.pendingApprovals = pending.filter(r => r.id !== rewardId);
            rewardSystem.saveData();
            
            alert('❌ درخواست رد شد');
            renderAdminDashboard();
        }
        
        // ============================================
        // SHOW MESSAGE
        // ============================================
        function showMessage(containerId, text, type) {
            const container = document.getElementById(containerId);
            if (!container) {
                const div = document.createElement('div');
                div.className = `message show ${type}`;
                div.textContent = text;
                div.style.position = 'fixed';
                div.style.top = '20px';
                div.style.left = '50%';
                div.style.transform = 'translateX(-50%)';
                div.style.zIndex = '9999';
                div.style.maxWidth = '500px';
                div.style.width = '90%';
                div.style.padding = '15px 20px';
                div.style.borderRadius = '12px';
                div.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 4000);
                return;
            }
            
            container.innerHTML = `<div class="message show ${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 4000);
        }
