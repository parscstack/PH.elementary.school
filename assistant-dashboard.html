<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 داشبورد معاونین</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="assistant-auth.js"></script>
    <script src="student-auth.js"></script>
    <script src="notification-system.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1a202c;
            --text: #2d3748;
            --border: #e2e8f0;
            --light: #f7fafc;
            --harvard-crimson: #A51C30;
            --harvard-dark: #1E3A5F;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: var(--light);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--harvard-dark) 0%, var(--harvard-crimson) 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(30, 58, 95, 0.3);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-left .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--harvard-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--harvard-dark);
        }
        
        .header-left .info .name {
            font-size: 18px;
            font-weight: 800;
        }
        
        .header-left .info .role {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Vazirmatn', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: var(--dark);
        }
        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .logout-btn {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Vazirmatn', sans-serif;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            border-top: 4px solid var(--primary);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .stat-icon {
            font-size: 35px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
        }
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        /* ===== PERMISSION CARDS ===== */
        .permission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .permission-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            border-right: 4px solid var(--border);
        }
        
        .permission-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);
        }
        
        .permission-card .pc-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        .permission-card .pc-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--dark);
        }
        
        .permission-card .pc-desc {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        .permission-card .pc-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 10px;
        }
        
        .permission-card .pc-badge.available {
            background: #d1fae5;
            color: #065f46;
        }
        
        .permission-card .pc-badge.locked {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .permission-card .pc-badge.edu {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .permission-card .pc-badge.culture {
            background: #d1fae5;
            color: #065f46;
        }
        
        .permission-card .pc-badge.exec {
            background: #fef3c7;
            color: #92400e;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .header-right {
                justify-content: center;
                width: 100%;
            }
            .permission-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header" id="appHeader" style="display: none;">
            <div class="header-left">
                <div class="avatar" id="assistantAvatar">م</div>
                <div class="info">
                    <div class="name" id="assistantName">نام معاون</div>
                    <div class="role" id="assistantRole">نقش</div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary btn-sm" onclick="window.location.href='assistant-login.html'">🔄 تغییر حساب</button>
                <button class="logout-btn" onclick="handleLogout()">🚪 خروج</button>
            </div>
        </div>
        
        <!-- ===== STATS ===== -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalStudents">0</div>
                <div class="stat-label">دانش‌آموزان</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="totalGoals">0</div>
                <div class="stat-label">اهداف ثبت شده</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-value" id="totalEvaluations">0</div>
                <div class="stat-label">خودارزیابی</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="totalBadges">0</div>
                <div class="stat-label">نشان‌ها</div>
            </div>
        </div>
        
        <!-- ===== PERMISSION CARDS ===== -->
        <div class="permission-grid" id="permissionGrid"></div>
    </div>

    <script>
        const assistantAuth = new AssistantAuth();
        const studentAuth = new StudentAuth();
        const notifSystem = new NotificationSystem();
        
        // ============================================
        // CHECK LOGIN
        // ============================================
        function checkLogin() {
            if (!assistantAuth.isLoggedIn()) {
                window.location.href = 'assistant-login.html';
                return false;
            }
            return true;
        }
        
        // ============================================
        // LOAD DASHBOARD
        // ============================================
        function loadDashboard() {
            if (!checkLogin()) return;
            
            const assistant = assistantAuth.getCurrentAssistant();
            const session = assistantAuth.session;
            
            // Header
            document.getElementById('appHeader').style.display = 'flex';
            document.getElementById('assistantAvatar').textContent = assistant.name.charAt(0);
            document.getElementById('assistantName').textContent = assistant.name;
            document.getElementById('assistantRole').textContent = assistant.roleTitle;
            
            // Stats
            updateStats();
            
            // Permissions
            renderPermissions(session);
        }
        
        // ============================================
        // UPDATE STATS
        // ============================================
        function updateStats() {
            try {
                const data = JSON.parse(localStorage.getItem('portfolio_database_v1') || '{"students":[], "goals":{}, "evaluations":{}, "rewards":{}}');
                const students = data.students || [];
                const goals = data.goals || {};
                const evals = data.evaluations || {};
                const rewards = data.rewards || {};
                
                let totalGoals = 0;
                Object.values(goals).forEach(g => totalGoals += g.length);
                
                let totalEvals = 0;
                Object.values(evals).forEach(e => totalEvals += Object.keys(e).length);
                
                let totalBadges = 0;
                Object.values(rewards).forEach(r => {
                    if (r.badges) totalBadges += r.badges.length;
                });
                
                document.getElementById('totalStudents').textContent = students.length;
                document.getElementById('totalGoals').textContent = totalGoals;
                document.getElementById('totalEvaluations').textContent = totalEvals;
                document.getElementById('totalBadges').textContent = totalBadges;
                
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }
        
        // ============================================
        // RENDER PERMISSIONS
        // ============================================
        function renderPermissions(session) {
            const grid = document.getElementById('permissionGrid');
            const role = session.role;
            const permissions = session.permissions || [];
            
            const allPermissions = [
                { id: 'view_students', icon: '👥', title: 'لیست دانش‌آموزان', desc: 'مشاهده و جستجوی دانش‌آموزان', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_goals', icon: '🎯', title: 'اهداف SMART', desc: 'مشاهده اهداف دانش‌آموزان', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_evaluations', icon: '📝', title: 'خودارزیابی ماهانه', desc: 'مشاهده خودارزیابی‌ها', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_charts', icon: '📊', title: 'نمودارهای پیشرفت', desc: 'تحلیل و گزارش‌گیری', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_badges', icon: '🏆', title: 'نشان‌ها و امتیازات', desc: 'مشاهده نشان‌های دانش‌آموزان', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_leaderboard', icon: '📋', title: 'جدول رتبه‌بندی', desc: 'مشاهده برترین دانش‌آموزان', link: '#', badge: 'دسترسی کامل' },
                { id: 'send_notification', icon: '📢', title: 'ارسال نوتیفیکیشن', desc: 'ارسال پیام به دانش‌آموزان و معلمان', link: '#', badge: 'دسترسی کامل' },
                { id: 'send_files', icon: '📎', title: 'ارسال فایل و پوستر', desc: 'ارسال فایل به دانش‌آموزان و معلمان', link: '#', badge: 'دسترسی کامل' },
                { id: 'manage_library', icon: '📚', title: 'مدیریت کتابخانه', desc: 'افزودن و مدیریت منابع آموزشی', link: '#', badge: 'دسترسی کامل' },
                { id: 'import_files', icon: '📄', title: 'افزودن دانش‌آموز از فایل', desc: 'ورد، PDF، JSON', link: '#', badge: 'دسترسی کامل' },
                { id: 'manage_classes', icon: '🏫', title: 'مدیریت کلاس‌ها', desc: 'افزودن/حذف/ویرایش کلاس‌ها', link: '#', badge: 'دسترسی کامل' },
                { id: 'manage_teachers', icon: '👨‍🏫', title: 'مدیریت معلمان', desc: 'افزودن/حذف/تخصیص معلمان', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_reports', icon: '📊', title: 'گزارش‌های کلی', desc: 'مشاهده گزارش‌های مدرسه', link: '#', badge: 'دسترسی کامل' },
                { id: 'view_logs', icon: '📋', title: 'لاگ‌های سیستم', desc: 'مشاهده فعالیت‌های سیستم', link: '#', badge: 'دسترسی کامل' },
                { id: 'manage_passwords', icon: '🔑', title: 'مدیریت رمزهای عبور', desc: 'ریست رمز کاربران', link: '#', badge: 'دسترسی کامل' }
            ];
            
            // Filter permissions based on user's role
            const rolePermissions = allPermissions.filter(p => {
                if (role === 'educational') {
                    return ['view_students', 'view_goals', 'view_evaluations', 'view_charts', 'send_notification', 'import_files'].includes(p.id);
                } else if (role === 'cultural') {
                    return ['view_students', 'view_badges', 'view_leaderboard', 'send_notification', 'send_files', 'manage_library'].includes(p.id);
                } else if (role === 'executive') {
                    return ['view_students', 'manage_classes', 'manage_teachers', 'view_reports', 'view_logs', 'manage_passwords', 'send_notification'].includes(p.id);
                }
                return false;
            });
            
            if (rolePermissions.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                        <span style="font-size: 50px; display: block; margin-bottom: 15px;">🔒</span>
                        <p>شما دسترسی به هیچ بخشی ندارید. با مدیر مدرسه تماس بگیرید.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = rolePermissions.map(p => `
                <a href="${p.link || '#'}" class="permission-card" onclick="handlePermissionClick('${p.id}')">
                    <span class="pc-icon">${p.icon}</span>
                    <div class="pc-title">${p.title}</div>
                    <div class="pc-desc">${p.desc}</div>
                    <span class="pc-badge ${role}">${p.badge}</span>
                </a>
            `).join('');
        }
        
        // ============================================
        // HANDLE PERMISSION CLICK
        // ============================================
        function handlePermissionClick(permissionId) {
            const session = assistantAuth.session;
            if (!session || !session.permissions.includes(permissionId)) {
                alert('❌ شما دسترسی به این بخش را ندارید.');
                return;
            }
            
            // Map permission to pages
            const pageMap = {
                'view_students': 'assistant-students.html',
                'view_goals': 'assistant-goals.html',
                'view_evaluations': 'assistant-evaluations.html',
                'view_charts': 'assistant-charts.html',
                'view_badges': 'assistant-badges.html',
                'view_leaderboard': 'leaderboard.html',
                'send_notification': 'assistant-notification.html',
                'send_files': 'assistant-send-files.html',
                'manage_library': 'assistant-library.html',
                'import_files': 'assistant-import.html',
                'manage_classes': 'assistant-classes.html',
                'manage_teachers': 'assistant-teachers.html',
                'view_reports': 'assistant-reports.html',
                'view_logs': 'assistant-logs.html',
                'manage_passwords': 'assistant-passwords.html'
            };
            
            const page = pageMap[permissionId];
            if (page) {
                window.location.href = page;
            } else {
                alert('🔧 این بخش در حال توسعه است.');
            }
        }
        
        // ============================================
        // LOGOUT
        // ============================================
        function handleLogout() {
            if (confirm('آیا از خروج از سیستم اطمینان دارید؟')) {
                assistantAuth.logout();
                window.location.href = 'assistant-login.html';
            }
        }
        
        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            if (assistantAuth.isLoggedIn()) {
                loadDashboard();
            } else {
                window.location.href = 'assistant-login.html';
            }
        });
        
        console.log('📊 داشبورد معاونین بارگذاری شد!');
        console.log('👤 کاربر:', assistantAuth.session?.name || 'نامشخص');
        console.log('🎯 نقش:', assistantAuth.session?.roleTitle || 'نامشخص');
    </script>
</body>
</html>
