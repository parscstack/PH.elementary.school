<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 کتابخانه منابع آموزشی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <script src="student-auth.js"></script>
    <script src="teacher-auth.js"></script>
    <script src="social-features.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1a202c;
            --text: #2d3748;
            --border: #e2e8f0;
            --light: #f7fafc;
            --harvard-crimson: #A51C30;
            --harvard-dark: #1E3A5F;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: var(--light);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
        }
        
        .header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 14px;
            color: #666;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: var(--light);
            color: var(--dark);
            border: 2px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            border-color: var(--primary);
            background: white;
            transform: translateY(-2px);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Vazirmatn', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: white;
            transform: translateY(-2px);
        }
        
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }
        
        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .filters select,
        .filters input {
            padding: 8px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 13px;
            background: white;
        }
        
        .filters select:focus,
        .filters input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .filters .search-input {
            flex: 1;
            min-width: 150px;
        }
        
        /* ===== RESOURCES GRID ===== */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .resource-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .resource-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .resource-card .resource-thumb {
            padding: 20px;
            text-align: center;
            font-size: 70px;
            background: linear-gradient(135deg, var(--light), #e8edf5);
            position: relative;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .resource-card .resource-thumb .file-type-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
        }
        
        .resource-card .resource-thumb .file-type-badge.video {
            background: #fee2e2;
            color: #991b1b;
        }
        .resource-card .resource-thumb .file-type-badge.pdf {
            background: #fef3c7;
            color: #92400e;
        }
        .resource-card .resource-thumb .file-type-badge.image {
            background: #dbeafe;
            color: #1e40af;
        }
        .resource-card .resource-thumb .file-type-badge.audio {
            background: #d1fae5;
            color: #065f46;
        }
        .resource-card .resource-thumb .file-type-badge.other {
            background: #f3e8ff;
            color: #6b21a8;
        }
        
        .resource-card .resource-thumb .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            opacity: 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .resource-card:hover .play-overlay {
            opacity: 1;
        }
        
        .resource-card .resource-body {
            padding: 20px;
        }
        
        .resource-card .resource-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
        }
        
        .resource-card .resource-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .resource-card .resource-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .resource-card .resource-meta .tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
            background: var(--light);
        }
        
        .resource-card .resource-meta .tag.grade-tag {
            background: #fef3c7;
            color: #92400e;
        }
        
        .resource-card .resource-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        
        .resource-card .resource-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        
        .resource-card .teacher-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .resource-card:hover .teacher-actions {
            opacity: 1;
        }
        
        .resource-card .teacher-actions .btn {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 8px;
        }
        
        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal-content .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }
        
        .modal-content .modal-header h2 {
            color: var(--dark);
            font-size: 22px;
        }
        
        .modal-close-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
            padding: 0 10px;
        }
        
        .modal-close-btn:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }
        
        .modal-content .form-group {
            margin-bottom: 18px;
        }
        
        .modal-content .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--dark);
        }
        
        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus,
        .modal-content .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-content .form-group .file-upload-area {
            border: 3px dashed var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--light);
            position: relative;
        }
        
        .modal-content .form-group .file-upload-area:hover {
            border-color: var(--primary);
            background: white;
        }
        
        .modal-content .form-group .file-upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .modal-content .form-group .file-upload-area .upload-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        
        .modal-content .form-group .file-upload-area .upload-text {
            font-size: 14px;
            color: #666;
        }
        
        .modal-content .form-group .file-upload-area .upload-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .modal-content .form-group .file-name-display {
            padding: 10px;
            background: var(--light);
            border-radius: 8px;
            font-size: 13px;
            color: var(--dark);
            display: none;
            margin-top: 10px;
        }
        
        .modal-content .form-group .file-name-display.show {
            display: block;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions .btn {
            flex: 1;
            justify-content: center;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        
        .message.show {
            display: block;
            animation: slideIn 0.4s ease;
        }
        
        .message.success {
            background: #d1fae5;
            color: var(--success);
        }
        
        .message.error {
            background: #fee2e2;
            color: var(--danger);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ===== EMPTY ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1 / -1;
        }
        
        .empty-icon {
            font-size: 80px;
            margin-bottom: 15px;
            display: block;
        }
        
        .empty-state h3 {
            color: var(--dark);
            margin-bottom: 10px;
        }
        
        /* ===== PREVIEW MODAL ===== */
        .preview-container {
            text-align: center;
        }
        
        .preview-container .preview-icon {
            font-size: 100px;
            display: block;
            margin-bottom: 20px;
        }
        
        .preview-container .preview-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 10px;
        }
        
        .preview-container .preview-desc {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .preview-container .preview-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 14px;
            color: #999;
            flex-wrap: wrap;
        }
        
        .preview-container .preview-file {
            background: var(--light);
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
        }
        
        .preview-container .preview-file img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .header-actions {
                width: 100%;
                justify-content: center;
            }
            
            .resources-grid {
                grid-template-columns: 1fr;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .filters select,
            .filters input {
                width: 100%;
            }
            
            .modal-content {
                padding: 20px;
                margin: 10px;
            }
            
            .resource-card .teacher-actions {
                opacity: 1;
                position: relative;
                top: auto;
                right: auto;
                margin-bottom: 10px;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .modal-actions {
                flex-direction: column;
            }
            
            .resource-card .resource-actions .btn {
                flex: 1;
                min-width: 50px;
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <div>
                <h1>📚 <span>کتابخانه منابع آموزشی</span></h1>
                <p>ویدیوها، کتاب‌ها، تمرین‌ها و فایل‌های آموزشی</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-success" onclick="openAddResourceModal()">➕ افزودن منبع</button>
                <a href="index.html" class="back-btn">← بازگشت</a>
            </div>
        </div>
        
        <!-- ===== FILTERS ===== -->
        <div class="filters">
            <select id="gradeFilter" onchange="renderResources()">
                <option value="">همه پایه‌ها</option>
                <option value="اول">اول ابتدایی</option>
                <option value="دوم">دوم ابتدایی</option>
                <option value="سوم">سوم ابتدایی</option>
                <option value="چهارم">چهارم ابتدایی</option>
                <option value="پنجم">پنجم ابتدایی</option>
                <option value="ششم">ششم ابتدایی</option>
            </select>
            <select id="typeFilter" onchange="renderResources()">
                <option value="">همه انواع</option>
                <option value="video">🎬 ویدیو</option>
                <option value="book">📖 کتاب</option>
                <option value="exercise">🧮 تمرین</option>
                <option value="pdf">📄 PDF</option>
                <option value="image">🖼️ تصویر</option>
                <option value="audio">🎵 صوتی</option>
            </select>
            <select id="categoryFilter" onchange="renderResources()">
                <option value="">همه دسته‌بندی‌ها</option>
                <option value="ریاضی">ریاضی</option>
                <option value="علوم">علوم</option>
                <option value="فارسی">فارسی</option>
                <option value="هنر">هنر</option>
                <option value="مهارت‌های زندگی">مهارت‌های زندگی</option>
                <option value="قرآن">قرآن</option>
                <option value="مطالعات">مطالعات</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 جستجو..." oninput="renderResources()">
        </div>
        
        <!-- ===== RESOURCES ===== -->
        <div class="resources-grid" id="resourcesGrid"></div>
    </div>
    
    <!-- ===== ADD RESOURCE MODAL ===== -->
    <div class="modal-overlay" id="addResourceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ افزودن منبع جدید</h2>
                <button class="modal-close-btn" onclick="closeModal('addResourceModal')">✕</button>
            </div>
            
            <div class="form-group">
                <label>عنوان:</label>
                <input type="text" id="resTitle" placeholder="عنوان منبع">
            </div>
            <div class="form-group">
                <label>توضیحات:</label>
                <textarea id="resDesc" placeholder="توضیحات کامل منبع"></textarea>
            </div>
            <div class="form-group">
                <label>دسته‌بندی:</label>
                <select id="resCategory">
                    <option value="ریاضی">ریاضی</option>
                    <option value="علوم">علوم</option>
                    <option value="فارسی">فارسی</option>
                    <option value="هنر">هنر</option>
                    <option value="مهارت‌های زندگی">مهارت‌های زندگی</option>
                    <option value="قرآن">قرآن</option>
                    <option value="مطالعات">مطالعات</option>
                </select>
            </div>
            <div class="form-group">
                <label>پایه تحصیلی:</label>
                <select id="resGrade">
                    <option value="">همه پایه‌ها</option>
                    <option value="اول">اول ابتدایی</option>
                    <option value="دوم">دوم ابتدایی</option>
                    <option value="سوم">سوم ابتدایی</option>
                    <option value="چهارم">چهارم ابتدایی</option>
                    <option value="پنجم">پنجم ابتدایی</option>
                    <option value="ششم">ششم ابتدایی</option>
                </select>
            </div>
            <div class="form-group">
                <label>نوع:</label>
                <select id="resType" onchange="toggleFileUpload()">
                    <option value="video">🎬 ویدیو</option>
                    <option value="book">📖 کتاب</option>
                    <option value="exercise">🧮 تمرین</option>
                    <option value="pdf">📄 PDF</option>
                    <option value="image">🖼️ تصویر</option>
                    <option value="audio">🎵 صوتی</option>
                </select>
            </div>
            <div class="form-group">
                <label>آیکون (اختیاری):</label>
                <input type="text" id="resIcon" placeholder="مثلاً: 📚" value="📚">
            </div>
            <div class="form-group">
                <label>لینک (برای ویدیوها):</label>
                <input type="text" id="resUrl" placeholder="https://www.aparat.com/...">
            </div>
            <div class="form-group">
                <label>آپلود فایل:</label>
                <div class="file-upload-area" id="fileUploadArea">
                    <span class="upload-icon">📤</span>
                    <div class="upload-text">فایل را اینجا بکشید یا کلیک کنید</div>
                    <div class="upload-hint">پشتیبانی از: PDF, تصاویر, MP3, MP4</div>
                    <input type="file" id="resFile" onchange="handleFileSelect(event)">
                </div>
                <div class="file-name-display" id="fileNameDisplay">
                    📎 <span id="fileNameText">فایل انتخاب شده</span>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addResourceModal')">لغو</button>
                <button class="btn btn-primary" onclick="addResource()">💾 ذخیره منبع</button>
            </div>
            <div id="addResourceMessage"></div>
        </div>
    </div>
    
    <!-- ===== PREVIEW MODAL ===== -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="previewTitle">پیش‌نمایش</h2>
                <button class="modal-close-btn" onclick="closeModal('previewModal')">✕</button>
            </div>
            <div id="previewContent"></div>
        </div>
    </div>

    <script>
        // ============================================
        // SOCIAL FEATURES
        // ============================================
        const social = new SocialFeatures();
        const auth = new StudentAuth();
        const teacherAuth = new TeacherAuth();
        const currentUser = auth.getCurrentStudent();
        const isTeacher = teacherAuth.isLoggedIn();
        let selectedFile = null;
        
        // ============================================
        // RENDER RESOURCES
        // ============================================
        function renderResources() {
            const category = document.getElementById('categoryFilter').value;
            const type = document.getElementById('typeFilter').value;
            const grade = document.getElementById('gradeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let resources = social.getResources(category, type);
            
            // Filter by grade
            if (grade) {
                resources = resources.filter(r => r.grade === grade || r.grade === '');
            }
            
            // Filter by search
            if (search) {
                resources = resources.filter(r => 
                    r.title.toLowerCase().includes(search) || 
                    (r.description && r.description.toLowerCase().includes(search))
                );
            }
            
            const grid = document.getElementById('resourcesGrid');
            
            if (resources.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">📭</span>
                        <h3>هیچ منبعی یافت نشد</h3>
                        <p>با افزودن منابع جدید، کتابخانه را پر کنید</p>
                    </div>
                `;
                return;
            }
            
            const typeIcons = {
                'video': '🎬',
                'book': '📖',
                'exercise': '🧮',
                'pdf': '📄',
                'image': '🖼️',
                'audio': '🎵'
            };
            
            grid.innerHTML = resources.map(res => {
                const icon = res.thumbnail || typeIcons[res.type] || '📚';
                const fileTypeClass = res.type || 'other';
                const gradeLabel = res.grade || 'همه پایه‌ها';
                
                return `
                    <div class="resource-card">
                        <div class="resource-thumb">
                            ${icon}
                            <span class="file-type-badge ${fileTypeClass}">${res.type || 'سایر'}</span>
                            ${res.type === 'video' ? `<div class="play-overlay" onclick="event.stopPropagation(); previewResource('${res.id}')">▶️</div>` : ''}
                            ${isTeacher ? `
                            <div class="teacher-actions">
                                <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); editResource('${res.id}')">✏️</button>
                                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteResource('${res.id}')">🗑️</button>
                            </div>
                            ` : ''}
                        </div>
                        <div class="resource-body">
                            <div class="resource-title">${res.title}</div>
                            <div class="resource-desc">${res.description || '---'}</div>
                            <div class="resource-meta">
                                <span class="tag">${res.category}</span>
                                <span class="tag grade-tag">${gradeLabel}</span>
                                <span>👁️ ${res.views || 0}</span>
                                <span>❤️ ${res.likes || 0}</span>
                                <span>📅 ${new Date(res.createdAt).toLocaleDateString('fa-IR')}</span>
                            </div>
                            <div class="resource-actions">
                                <button class="btn btn-primary btn-sm" onclick="previewResource('${res.id}')">👁️ مشاهده</button>
                                <button class="btn btn-secondary btn-sm" onclick="likeResource('${res.id}')">❤️</button>
                                <button class="btn btn-secondary btn-sm" onclick="openCommentModal('${res.id}')">💬 نظر</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============================================
        // FILE UPLOAD
        // ============================================
        function toggleFileUpload() {
            const type = document.getElementById('resType').value;
            const uploadArea = document.getElementById('fileUploadArea');
            const urlInput = document.getElementById('resUrl');
            
            if (type === 'video' || type === 'book') {
                uploadArea.style.display = 'block';
                urlInput.style.display = 'block';
            } else {
                uploadArea.style.display = 'block';
                urlInput.style.display = 'block';
            }
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            selectedFile = file;
            document.getElementById('fileNameText').textContent = file.name;
            document.getElementById('fileNameDisplay').classList.add('show');
        }
        
        // ============================================
        // CRUD OPERATIONS
        // ============================================
        function addResource() {
            const title = document.getElementById('resTitle').value.trim();
            const description = document.getElementById('resDesc').value.trim();
            const category = document.getElementById('resCategory').value;
            const type = document.getElementById('resType').value;
            const grade = document.getElementById('resGrade').value;
            const thumbnail = document.getElementById('resIcon').value || '📚';
            const url = document.getElementById('resUrl').value.trim();
            
            if (!title) {
                showMessage('addResourceMessage', '❌ لطفاً عنوان را وارد کنید.', 'error');
                return;
            }
            
            // In a real app, you would upload the file to a server
            // Here we store it in localStorage as base64 for demo
            let fileData = null;
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result;
                    saveResource(title, description, category, type, grade, thumbnail, url, fileData);
                };
                reader.readAsDataURL(selectedFile);
            } else {
                saveResource(title, description, category, type, grade, thumbnail, url, null);
            }
        }
        
        function saveResource(title, description, category, type, grade, thumbnail, url, fileData) {
            const resource = social.addResource({
                title: title,
                description: description,
                category: category,
                type: type,
                grade: grade || '',
                thumbnail: thumbnail,
                url: url,
                fileData: fileData
            });
            
            closeModal('addResourceModal');
            renderResources();
            selectedFile = null;
            document.getElementById('fileNameDisplay').classList.remove('show');
            document.getElementById('resFile').value = '';
            
            showMessage('addResourceMessage', '✅ منبع با موفقیت اضافه شد!', 'success');
            setTimeout(() => {
                document.getElementById('addResourceMessage').innerHTML = '';
            }, 3000);
        }
        
        function editResource(resourceId) {
            const resource = social.getResourceById(resourceId);
            if (!resource) return;
            
            const newTitle = prompt('عنوان جدید:', resource.title);
            if (newTitle !== null && newTitle.trim()) {
                resource.title = newTitle.trim();
                const newDesc = prompt('توضیحات جدید:', resource.description || '');
                if (newDesc !== null) {
                    resource.description = newDesc.trim();
                    social.saveData();
                    renderResources();
                    alert('✅ منبع با موفقیت ویرایش شد!');
                }
            }
        }
        
        function deleteResource(resourceId) {
            if (confirm('⚠️ آیا از حذف این منبع اطمینان دارید؟')) {
                social.data.resources = social.data.resources.filter(r => r.id !== resourceId);
                social.saveData();
                renderResources();
                alert('✅ منبع با موفقیت حذف شد!');
            }
        }
        
        // ============================================
        // PREVIEW
        // ============================================
        function previewResource(resourceId) {
            const resource = social.getResourceById(resourceId);
            if (!resource) return;
            
            social.incrementViews(resourceId);
            
            document.getElementById('previewTitle').textContent = resource.title;
            const container = document.getElementById('previewContent');
            
            let fileHtml = '';
            if (resource.fileData) {
                const fileType = resource.type;
                if (fileType === 'image') {
                    fileHtml = `<div class="preview-file"><img src="${resource.fileData}" alt="${resource.title}"></div>`;
                } else if (fileType === 'video') {
                    fileHtml = `<div class="preview-file"><video controls style="width:100%;max-height:400px;border-radius:10px;"><source src="${resource.fileData}"></video></div>`;
                } else if (fileType === 'audio') {
                    fileHtml = `<div class="preview-file"><audio controls style="width:100%;"><source src="${resource.fileData}"></audio></div>`;
                } else if (fileType === 'pdf') {
                    fileHtml = `<div class="preview-file"><embed src="${resource.fileData}" style="width:100%;height:400px;border-radius:10px;"></div>`;
                } else {
                    fileHtml = `<div class="preview-file"><a href="${resource.fileData}" download class="btn btn-primary">📥 دانلود فایل</a></div>`;
                }
            } else if (resource.url) {
                fileHtml = `<div class="preview-file"><a href="${resource.url}" target="_blank" class="btn btn-primary">🔗 مشاهده لینک</a></div>`;
            }
            
            const comments = social.getComments(resourceId);
            let commentsHtml = comments.map(c => `
                <div style="padding: 8px 0; border-bottom: 1px dashed var(--border);">
                    <strong>${c.studentName}</strong>
                    <span style="font-size: 12px; color: #999;">${new Date(c.createdAt).toLocaleDateString('fa-IR')}</span>
                    <p style="font-size: 13px; color: #666; margin-top: 3px;">${c.text}</p>
                </div>
            `).join('');
            
            if (comments.length === 0) {
                commentsHtml = '<p style="color: #999; text-align: center;">هنوز نظری ثبت نشده است</p>';
            }
            
            container.innerHTML = `
                <div class="preview-container">
                    <span class="preview-icon">${resource.thumbnail || '📚'}</span>
                    <div class="preview-title">${resource.title}</div>
                    <div class="preview-desc">${resource.description || 'توضیحی وجود ندارد'}</div>
                    ${fileHtml}
                    <div class="preview-meta">
                        <span>📂 ${resource.category}</span>
                        <span>🏷️ ${resource.grade || 'همه پایه‌ها'}</span>
                        <span>👁️ ${resource.views || 0} بازدید</span>
                        <span>❤️ ${resource.likes || 0} لایک</span>
                    </div>
                    <hr style="margin: 20px 0; border-color: var(--border);">
                    <h4 style="color: var(--dark); margin-bottom: 10px;">💬 نظرات</h4>
                    ${commentsHtml}
                </div>
            `;
            
            document.getElementById('previewModal').classList.add('active');
        }
        
        function likeResource(resourceId) {
            social.likeResource(resourceId);
            renderResources();
        }
        
        // ============================================
        // COMMENTS
        // ============================================
        function openCommentModal(resourceId) {
            const comment = prompt('💬 نظر خود را بنویسید:');
            if (comment && comment.trim()) {
                const studentName = currentUser ? currentUser.name : 'کاربر';
                social.addComment(resourceId, studentName, comment.trim());
                renderResources();
                alert('✅ نظر شما با موفقیت ثبت شد!');
            }
        }
        
        // ============================================
        // MODAL
        // ============================================
        function openAddResourceModal() {
            document.getElementById('addResourceModal').classList.add('active');
            document.getElementById('resTitle').value = '';
            document.getElementById('resDesc').value = '';
            document.getElementById('resUrl').value = '';
            document.getElementById('resIcon').value = '📚';
            document.getElementById('addResourceMessage').innerHTML = '';
            document.getElementById('fileNameDisplay').classList.remove('show');
            document.getElementById('resFile').value = '';
            selectedFile = null;
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // ============================================
        // MESSAGE
        // ============================================
        function showMessage(containerId, text, type) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = `<div class="message show ${type}">${text}</div>`;
        }
        
        // ============================================
        // INIT
        // ============================================
        renderResources();
        
        // Close modal on outside click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
        
        console.log('📚 کتابخانه منابع آموزشی پیشرفته بارگذاری شد!');
        console.log('👨‍🏫 وضعیت معلم:', isTeacher ? 'ورود کرده' : 'ورود نکرده');
    </script>
</body>
</html>
